<!DOCTYPE html>
<html lang="th">
{% include head.html %}
<body>
  {% include header.html %}
  <main>
    <article class="prose">
      {{ content }}
    </article>
    <a class="back-link" href="{{ '/' | relative_url }}">← กลับหน้าแรก</a>
  </main>
  {% include footer.html %}

  <!-- Auto-layout script for 4-layer chapter tabs -->
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const tabContents = document.querySelectorAll(".chapter-tab-content");
      if (tabContents.length === 0) return;
      
      const h1 = document.querySelector(".prose h1");
      if (!h1) return;
      
      const nav = document.createElement("div");
      nav.className = "chapter-tabs-nav";
      
      tabContents.forEach((tab, index) => {
        const tabName = tab.getAttribute("data-tab-name") || "Tab " + (index + 1);
        const tabIcon = tab.getAttribute("data-tab-icon") || "";
        const tabId = tab.getAttribute("id");
        
        const btn = document.createElement("button");
        btn.className = "chapter-tab-btn" + (index === 0 ? " active" : "");
        btn.innerHTML = (tabIcon ? `<span class="tab-icon">${tabIcon}</span> ` : "") + tabName;
        btn.setAttribute("data-target", tabId);
        
        btn.addEventListener("click", function() {
          nav.querySelectorAll(".chapter-tab-btn").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          
          tabContents.forEach(content => content.classList.remove("active"));
          document.getElementById(tabId).classList.add("active");
          
          history.replaceState(null, null, "#" + tabId);
        });
        
        nav.appendChild(btn);
        
        if (index === 0) {
          tab.classList.add("active");
        } else {
          tab.classList.remove("active");
        }
      });
      
      h1.parentNode.insertBefore(nav, h1.nextSibling);
      
      // Auto-restore active tab from hash
      const hash = window.location.hash;
      if (hash) {
        const targetId = hash.substring(1);
        const targetBtn = nav.querySelector(`[data-target="${targetId}"]`);
        if (targetBtn) {
          targetBtn.click();
        }
      }
    });
  </script>
</body>
</html>
